apiVersion: v1
kind: Service
metadata:
  name: scheduler-service
spec:
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: scheduler

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-deployment
spec:
  selector:
    matchLabels:
      app: scheduler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - image: swensadocker/dims-scheduler-dev:1.0.0-485
          name: scheduler
          resources:
            requests:
              memory: "500Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: URL
              value: _URL_
            - name: CLIENT_ID
              value: _CLIENT_ID_    
            - name: SECRET
              value: _SECRET_
            - name: Agent
              value: "true"
            - name: BACKUP_CSV_PATH
              value: /backup/        
            - name: INTEGRATIONS
              value: '01:00' 
            
          ports:
            - containerPort: 5000
              name: scheduler
          volumeMounts:
            - name: scheduler-persistent-storage
              mountPath: /backup/
      volumes:
        - name: scheduler-persistent-storage
          persistentVolumeClaim:
            claimName: scheduler-pv-claim
              
           
                   
